<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Pre-emptively make window.fetch configurable, writable and fully override-safe
      // to avoid TypeErrors in environments where third-party embedded or extension scripts try to proxy/modify fetch
      try {
        const originalFetch = window.fetch;
        let activeFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return activeFetch;
          },
          set(newValue) {
            activeFetch = newValue;
          },
          enumerable: true,
          configurable: true
        });
      } catch (e) {
        console.warn('Polyfill for window.fetch setup failed:', e);
      }

      // High safety general uncaught exception bubble suppressors
      window.addEventListener('error', function(event) {
        if (event.error && event.error.message && event.error.message.includes('fetch')) {
          event.preventDefault();
          event.stopPropagation();
        }
        if (event.message && event.message.includes('fetch')) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && event.reason.message.includes('fetch')) {
          event.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
